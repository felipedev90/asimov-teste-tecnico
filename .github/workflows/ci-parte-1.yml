name: CI — parte-1

on:
  push:
    branches: [main]
    paths:
      - "parte-1/**"
      - ".github/workflows/ci-parte-1.yml"
  pull_request:
    branches: [main]
    paths:
      - "parte-1/**"
      - ".github/workflows/ci-parte-1.yml"

concurrency:
  group: ci-parte-1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, build & E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: parte-1/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: parte-1

      - name: Lint
        run: npm run lint
        working-directory: parte-1

      - name: Build
        run: npm run build
        working-directory: parte-1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: parte-1

      - name: Run E2E tests
        run: npx playwright test
        working-directory: parte-1
